[pytest]
pythonpath = .

# Настройки логирования
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Маркеры тестов
markers =
    smoke: Быстрые тесты для проверки основной функциональности
    regression: Полные регрессионные тесты
    exploratory: Исследовательские тесты (не для регулярного запуска)
    xfail: Ожидаемо падающие тесты (известные проблемы)

# Параметры по умолчанию
addopts =
    -v
    --strict-markers
    --tb=short
    --maxfail=1